name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run plugin structure tests
        run: python3 tests/test_plugin_structure.py

      - name: Run smoke tests
        run: python3 tests/smoke_test.py

      - name: Run benchmarks
        run: python3 tests/benchmark.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run Docker tests
        run: |
          docker build -f Dockerfile.test -t claude-lcm-test .
          docker run --rm claude-lcm-test
